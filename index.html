<!DOCTYPE html>

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,Tahoma,sans-serif;background:#eef2f7;min-height:100vh;color:#1a1a2e}
.login-wrap{min-height:100vh;background:linear-gradient(160deg,#1565c0,#0d47a1);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.login-icon{font-size:64px;margin-bottom:10px}
.login-h{color:#fff;font-size:26px;font-weight:800}
.login-s{color:rgba(255,255,255,.7);font-size:14px;margin-bottom:28px}

.box-title{font-size:15px;font-weight:700;color:#555;margin-bottom:14px}
.inp{width:100%;padding:14px;border:2px solid #e0e0e0;border-radius:10px;font-size:16px;font-family:inherit;margin-bottom:4px}
.inp:focus{outline:none;border-color:#1565c0}

.big-btn:last-child{margin-bottom:0}
.big-btn.sel,.big-btn:active{border-color:#1565c0;background:#e8f0fe;color:#1565c0}
.go-btn{width:100%;padding:15px;background:#1565c0;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:14px}
.topbar{background:#1565c0;color:#fff;padding:14px 16px;position:sticky;top:0;z-index:50;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.tb-l{font-size:17px;font-weight:700}
.tb-s{font-size:12px;opacity:.8;margin-top:1px}
.content{padding:14px;padding-bottom:85px}
.card{background:#fff;border-radius:14px;box-shadow:0 2px 8px rgba(0,0,0,.08);padding:16px;margin-bottom:12px}
.ct{font-size:15px;font-weight:700;color:#1565c0;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.fl{margin-bottom:13px}
.fl label{display:block;font-size:13px;color:#666;font-weight:600;margin-bottom:5px}
.fl select,.fl input{width:100%;padding:12px;border:2px solid #e0e0e0;border-radius:10px;font-size:15px;font-family:inherit;background:#fff}
.fl select:focus,.fl input:focus{outline:none;border-color:#1565c0}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:13px;border-radius:10px;font-size:15px;font-weight:700;font-family:inherit;border:none;cursor:pointer;width:100%;transition:opacity .15s}
.btn:active{opacity:.8}
.b-blue{background:#1565c0;color:#fff}
.b-green{background:#2e7d32;color:#fff}
.b-orange{background:#e65100;color:#fff}
.b-red{background:#c62828;color:#fff}
.b-out{background:#fff;border:2px solid #1565c0;color:#1565c0}
.b-sm{padding:9px 14px;font-size:13px;width:auto}
.b-xs{padding:6px 10px;font-size:12px;width:auto}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
.stat{background:#fff;border-radius:12px;padding:13px 8px;text-align:center;box-shadow:0 2px 6px rgba(0,0,0,.07)}
.sn{font-size:26px;font-weight:800;color:#1565c0}
.sl{font-size:11px;color:#999;margin-top:2px}

.tab.on{background:#1565c0;color:#fff}

.rq.assigned{border-color:#2e7d32}
.rq.approved{border-color:#1565c0}
.rq-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px}
.rq-team{font-weight:700;font-size:14px}
.rq-route{font-size:13px;color:#555;margin-bottom:3px}
.rq-sub{font-size:12px;color:#999}

.bp{background:#fff3e0;color:#e65100}
.ba{background:#e8f5e9;color:#2e7d32}
.bb{background:#e3f2fd;color:#1565c0}

.ni{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px 12px;font-size:10px;color:#ccc;cursor:pointer}
.ni.on{color:#1565c0}
.ni-ic{font-size:20px;margin-bottom:2px}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;display:none;align-items:flex-end}
.ov.open{display:flex}
.modal{background:#fff;border-radius:16px 16px 0 0;padding:20px;width:100%;max-height:88vh;overflow-y:auto}
.mt{font-size:16px;font-weight:700;color:#1565c0;margin-bottom:14px}
.empty{text-align:center;padding:32px;color:#ccc;font-size:14px}

.veh-info{flex:1}

<div id="root"></div>

<!-- Route Modal -->
<div class="ov" id="rmodal">
  <div class="modal" style="max-height:92vh">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div class="mt" style="margin:0">🗺 خطة الرحلة</div>
      <button style="background:none;border:none;font-size:22px;cursor:pointer;color:#888" onclick="closeModal('rmodal')">✕</button>
    </div>
    <div id="rmodal-body"></div>
  </div>
</div>

<!-- Assign Modal -->
<div class="ov" id="amodal">
  <div class="modal">
    <div class="mt">🔑 تأكيد التعيين</div>
    <div id="ainfo" style="background:#f5f5f5;border-radius:8px;padding:10px;margin-bottom:14px;font-size:13px;line-height:1.7"></div>
    <div class="fl"><label>رقم السيارة</label><input id="aplate" type="text" placeholder="اللوحة"></div>
    <div class="fl"><label>اسم السائق</label><input id="adriver" type="text" placeholder="الاسم"></div>
    <div class="fl"><label>نوع السيارة</label>
      <select id="atype">
        <option value="pickup">🛻 دبل — 4 ركاب</option>
        <option value="van">🚐 فان — 7 ركاب</option>
        <option value="micro14">🚌 ميكروباص — 14 راكب</option>
        <option value="minibus">🚎 ميني باص — 20 راكب</option>
        <option value="bus26">🚍 أتوبيس — 45 راكب</option>
        <option value="truck">🚛 دبابة — 3 ركاب</option>
      </select>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn b-green" onclick="confirmAssign()">✅ اعتماد</button>
      <button class="btn b-out" onclick="closeModal('amodal')">إلغاء</button>
    </div>
  </div>
</div>

<!-- Vehicle Edit Modal -->
<div class="ov" id="vemodal">
  <div class="modal">
    <div class="mt" id="ve-title">تعديل سيارة</div>
    <div class="fl"><label>رقم اللوحة</label><input id="ve-plate" type="text" placeholder="رقم اللوحة"></div>
    <div class="fl"><label>اسم السائق</label><input id="ve-driver" type="text" placeholder="اسم السائق"></div>
    <div class="fl"><label>النوع</label>
      <select id="ve-type">
        <option value="pickup">🛻 دبل — 4 ركاب</option>
        <option value="van">🚐 فان — 7 ركاب</option>
        <option value="micro14">🚌 ميكروباص — 14 راكب</option>
        <option value="minibus">🚎 ميني باص — 20 راكب</option>
        <option value="bus26">🚍 أتوبيس — 45 راكب</option>
        <option value="truck">🚛 دبابة — 3 ركاب</option>
      </select>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn b-blue" onclick="saveVehicle()">💾 حفظ</button>
      <button class="btn b-out" onclick="closeModal('vemodal')">إلغاء</button>
    </div>
  </div>
</div>

<!-- Modal استبدال السائق -->
<div class="ov" id="replaceModal" style="display:none">
  <div class="modal" style="max-width:420px">
    <div class="mt">🔄 استبدال السائق / السيارة</div>
    <div id="replace-current" style="background:#fff3e0;border-radius:8px;padding:10px;margin-bottom:14px;font-size:13px"></div>
    <div class="fl" style="margin-bottom:12px">
      <label>اختر السيارة البديلة</label>
      <select id="replace-veh" class="inp" style="padding:10px">
        <option value="">— اختر —</option>
      </select>
    </div>
    <div class="fl" style="margin-bottom:14px">
      <label>سبب الاستبدال</label>
      <select id="replace-reason" class="inp" style="padding:10px">
        <option value="إجازة سائق">إجازة سائق</option>
        <option value="عطل سيارة">عطل سيارة</option>
        <option value="سيارة في مهمة أخرى">سيارة في مهمة أخرى</option>
        <option value="أخرى">أخرى</option>
      </select>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn b-green" onclick="confirmReplaceDriver()">✅ تأكيد الاستبدال</button>
      <button class="btn b-out" onclick="document.getElementById('replaceModal').style.display='none'">إلغاء</button>
    </div>
  </div>
</div>

<div id="toast"></div>

function mapsUrl(loc){
  if(!loc) return '#';
  if(MAPS_OVERRIDE[loc]) return MAPS_OVERRIDE[loc];
  return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(loc+' مصر');
}
function mapsBtn(loc, size='sm'){
  if(!loc) return '';
  return `<a href="${mapsUrl(loc)}" target="_blank" rel="noopener"
    style="display:inline-flex;align-items:center;gap:4px;padding:${size==='xs'?'4px 8px':'6px 10px'};
    background:#4285f4;color:#fff;border-radius:7px;font-size:${size==='xs'?'11px':'12px'};

}

  else toast('✋ رابط غير صحيح');
}

function doLogin(){
  const name = (document.getElementById('L-name').value||'').trim();
  const pass = (document.getElementById('L-pass').value||'').trim();
  if(!name) return toast('✋ اختر اسمك');
  if(!pass) return toast('✋ أدخل كلمة المرور');
  const user = USERS.find(u=>u.name===name && u.password===pass);
  if(!user) return toast('❌ كلمة المرور غلط');
  login(user.name, user.role, user.team);
}

function login(name,role,team){
  U={name,role,team};
  try{localStorage.setItem('flt_u',JSON.stringify(U));}catch(e){}
  renderApp();
}
function doLogout(){ U=null;REQS=[];try{localStorage.removeItem('flt_u');}catch(e){} render(); }

// ── إلغاء الطلب ──
async function cancelReq(id){
  if(!confirm('هل تريد إلغاء هذا الطلب؟')) return;
  const reqs=loadLocalReqs();
  const req=reqs.find(r=>r.id===id);
  if(req){ req.status='cancelled'; saveLocalReqs(reqs); }
  await api('cancelRequest',{id, cancelled_by:U.name});
  toast('✅ تم إلغاء الطلب');
  loadMyReqs();
}

// ── تعديل الطلب ──
function openEditReq(id){
  const r=loadLocalReqs().find(x=>x.id===id)||REQS.find(x=>x.id===id);
  if(!r) return toast('⚠️ الطلب غير موجود');
  const html=`
  <div style="background:#fff;border-radius:16px;padding:20px;position:fixed;inset:10px;z-index:1000;overflow-y:auto;box-shadow:0 4px 24px rgba(0,0,0,.3)">
    <div style="font-weight:700;font-size:16px;margin-bottom:16px">✏️ تعديل الطلب</div>
    <label class="fl">اسم العميل<input class="inp" id="ed-client" value="${r.client||''}"></label>
    <label class="fl">ملاحظات<input class="inp" id="ed-notes" value="${r.notes||''}"></label>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn b-green" style="flex:1" onclick="confirmEditReq('${id}')">💾 حفظ</button>
      <button class="btn b-out" style="flex:1" onclick="this.closest('div').parentNode.remove()">إلغاء</button>
    </div>
  </div>`;
  document.body.insertAdjacentHTML('beforeend',html);
}
async function confirmEditReq(id){
  const client=document.getElementById('ed-client').value.trim();
  const notes =document.getElementById('ed-notes').value.trim();
  const reqs=loadLocalReqs();
  const req=reqs.find(r=>r.id===id);
  if(req){ req.client=client; req.notes=notes; saveLocalReqs(reqs); }
  await api('updateRequest',{id, client, notes});
  document.querySelectorAll('[onclick*="confirmEditReq"]').forEach(b=>b.closest('div[style*="position:fixed"]')?.remove());
  toast('✅ تم التعديل');
  loadMyReqs();
}

function addStopRow(){
  const list = document.getElementById('stops-list');
  const div  = document.createElement('div');
  div.className='stop-row';
  div.style='display:flex;gap:6px;margin-bottom:6px';
  div.innerHTML=`<select class="inp stop-sel" style="flex:1"><option value="">— بدون محطة —</option>${LOC_OPTS_HTML}</select>
    <button type="button" onclick="this.parentNode.remove()" style="background:#e53935;color:#fff;border:none;border-radius:8px;padding:0 12px;font-size:18px;cursor:pointer">−</button>`;
  list.appendChild(div);
}

// ══ ENGINEER ══
async function submitReq(){
  const team = U.team; // تلقائي من الـ login
  const from   = document.getElementById('e-from').value;
  const stops  = [...document.querySelectorAll('.stop-sel')].map(s=>s.value).filter(Boolean);
  const stop   = stops.join(' ← ');
  const dest   = document.getElementById('e-dest').value;
  const client = (document.getElementById('e-client').value||'').trim();

  // الأفراد المحددين بالاسم
  const selectedMembers = [...document.querySelectorAll('.mem-cb:checked')].map(cb=>cb.value);
  // أضف اسم المدير لو اختار نفسه
  const cbMgr = document.getElementById('cb-manager');
  if(cbMgr && cbMgr.checked) selectedMembers.unshift(U.name);
  const techs = selectedMembers.length;

  if(!client) return toast('✋ أدخل اسم العميل');
  if(!from)   return toast('✋ اختر مكان التحرك');
  if(!dest)   return toast('✋ اختر مكان الوصول');
  if(!techs)  return toast('✋ اختر الأفراد المسافرين');

  const btn=document.getElementById('sbtn');
  btn.textContent='⏳...'; btn.disabled=true;
  try{
    const r=await api('addRequest',{
      team, from_loc:from, stop_loc:stop, dest,
      client,
      techs,
      members: selectedMembers,
      created_by: U.name,
      date: todayStr()
    });
    if(r.ok){
      // حفظ فوري في localStorage
      const newReq = {
        id: r.id||('L'+Date.now()),
        date: todayStr(), team, from_loc:from,
        stop_loc:stop, dest, client, techs,
        members: selectedMembers,
        created_by: U.name, status:'pending'
      };
      addLocalReq(newReq);
      // إعادة تعيين النموذج كاملاً
      document.getElementById('e-from').value='';
      document.getElementById('e-dest').value='';
      document.getElementById('e-client').value='';
      // إعادة المحطات لمحطة واحدة فارغة
      const sl=document.getElementById('stops-list');
      if(sl) sl.innerHTML=`<div class="stop-row" style="display:flex;gap:6px;margin-bottom:6px">
        <select class="inp stop-sel" style="flex:1"><option value="">— بدون محطة —</option>${window.LOC_OPTS_HTML||''}</select>
        <button type="button" onclick="addStopRow()" style="background:#1565c0;color:#fff;border:none;border-radius:8px;padding:0 12px;font-size:18px;cursor:pointer">+</button>
      </div>`;
      const cbMgr2=document.getElementById('cb-manager'); if(cbMgr2) cbMgr2.checked=false;
      selectAllMembers(false);
      // رسالة تأكيد واضحة
      toast('✅ تم إرسال الطلب بنجاح!', 4000);
      loadMyReqs();
    } else toast('❌ '+(r.error||'خطأ'));
  }catch(e){toast('❌ تعذّر الاتصال');}
  btn.textContent='📤 إرسال الطلب'; btn.disabled=false;
}

// ── Local cache helpers ──────────────────────────────────
function cacheKey(){ return 'reqs_'+todayStr(); }
function saveLocalReqs(reqs){ try{localStorage.setItem(cacheKey(),JSON.stringify(reqs));}catch(e){} }
function loadLocalReqs(){ try{return JSON.parse(localStorage.getItem(cacheKey())||'[]');}catch(e){return[];} }
function addLocalReq(req){ const r=loadLocalReqs(); r.push(req); saveLocalReqs(r); }

async function loadMyReqs(){
  const el=document.getElementById('mylist'); if(!el) return;
  el.innerHTML='<div class="empty">⏳...</div>';

  // عرض الـ cache فوراً
  const cached = loadLocalReqs();
  if(cached.length){ REQS=cached; }

  try{
    const r=await apiGet('getRequests',{date:todayStr()});
    const serverReqs = r.requests||[];
    if(serverReqs.length){
      // دمج: السيرفر يحدّث الـ status والسيارة، الـ cache يكمل الباقي
      const merged = serverReqs.map(sr => {
        const local = cached.find(c=>c.id===sr.id)||{};
        return {...local, ...sr}; // السيرفر له الأولوية
      });
      // أضف طلبات الـ cache اللي مش على السيرفر (حديثة لسه)
      cached.forEach(c=>{ if(!merged.find(m=>m.id===c.id)) merged.push(c); });
      REQS = merged;
      saveLocalReqs(merged);
    } else {
      REQS = cached;
    }
  }catch(e){ REQS = cached; }

  const mine=REQS.filter(x=>x.team===U.team||x.created_by===U.name);
  el.innerHTML=mine.length?mine.map(r=>rqHTML(r,false)).join(''):'<div class="empty">لا توجد طلبات اليوم 📭</div>';
  renderRemainingMembers();
}

// الأفراد المحددين في طلبات اليوم السابقة
function getAssignedMembers(){
  const myReqs = REQS.filter(x=>x.team===U.team||x.created_by===U.name);
  const assigned = new Set();
  myReqs.forEach(r=>{
    const mems = Array.isArray(r.members) ? r.members
      : typeof r.members==='string' && r.members ? r.members.split('،').map(s=>s.trim())
      : [];
    mems.forEach(m=>{ if(m) assigned.add(m); });
  });
  return assigned;
}

// عرض الأفراد المتبقين فقط (اللي مش في طلب سابق)
function renderRemainingMembers(){
  const el=document.getElementById('members-list'); if(!el) return;
  const allMembers = TEAM_MEMBERS[U?.team] || [];
  const assigned   = getAssignedMembers();
  const remaining  = allMembers.filter(m=>!assigned.has(m));

  if(!remaining.length){
    el.innerHTML='<div class="empty" style="padding:12px;color:#e65100">✅ تم تحديد جميع أفراد المجموعة في طلبات اليوم</div>';
    return;
  }

  el.innerHTML = remaining.map(m=>`
    <label style="display:flex;align-items:center;gap:8px;padding:7px 4px;border-bottom:1px solid #f0f0f0;cursor:pointer;font-size:14px">
      <input type="checkbox" class="mem-cb" value="${m}"
        style="width:18px;height:18px;cursor:pointer;accent-color:#1565c0">
      <span>${m}</span>
    </label>`).join('');

  // عداد
  const total = allMembers.length;
  const done  = assigned.size;
  const cnt   = document.getElementById('sel-count');
  if(cnt) cnt.textContent=`0 محدد | متبقى ${remaining.length} من ${total}`;

  bindMemberCbs();
}

// ══ FLEET MANAGER ══
async function loadAllReqs(){
  const el=document.getElementById('tab-reqs'); if(!el) return;
  el.innerHTML='<div class="empty">⏳...</div>';

  const cached = loadLocalReqs();
  if(cached.length){ REQS=cached; updStats(); renderFmReqs(); }

  try{
    const r=await apiGet('getRequests',{date:todayStr()});
    const serverReqs=r.requests||[];
    if(serverReqs.length){
      const merged=serverReqs.map(sr=>({...(cached.find(c=>c.id===sr.id)||{}),...sr}));
      cached.forEach(c=>{ if(!merged.find(m=>m.id===c.id)) merged.push(c); });
      REQS=merged;
      saveLocalReqs(merged);
    } else {
      REQS=cached;
    }
  }catch(e){ REQS=cached; }

  updStats(); renderFmReqs();
}

function updStats(){
  const e0=document.getElementById('st0'),e1=document.getElementById('st1'),
        e2=document.getElementById('st2'),e3=document.getElementById('st3');
  if(e0) e0.textContent=REQS.length;
  if(e1) e1.textContent=REQS.filter(r=>r.status==='pending').length;
  if(e2) e2.textContent=REQS.filter(r=>r.status==='approved').length;
  if(e3) e3.textContent=REQS.reduce((s,r)=>s+parseInt(r.techs||0),0);
}

function fmTab(name,btn){
  CUR_TAB=name;
  ['reqs','dash','plan','hist','ratings','drivers','order','veh'].forEach(t=>{
    const el=document.getElementById('tab-'+t); if(el) el.style.display=t===name?'':'none';
  });
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  btn.classList.add('on');
  if(name==='reqs')    renderFmReqs();
  if(name==='dash')    renderDashboard();
  if(name==='plan')    renderPlan();
  if(name==='hist')    loadHistory();
  if(name==='ratings') loadRatings();
  if(name==='drivers') loadDriverLog();
  if(name==='order')   renderOrder();
  if(name==='veh')     renderVehicles();
}

async function loadHistory(){

  el.innerHTML='<div class="empty">⏳ جارى التحميل...</div>';
  try{
    const r=await apiGet('getHistory',{days:30});

    if(!reqs.length){ el.innerHTML='<div class="empty">لا توجد سجلات سابقة</div>'; return; }

      <div style="margin-bottom:16px">

function rqHTML(r,mgr=false){
  const status=r.status||'pending';
  const badge=status==='approved'?'<span class="badge bb">✅ معتمد</span>':status==='pending'?'<span class="badge bp">⏳ انتظار</span>':'<span class="badge ba">محدد</span>';
  const veh=r.plate?`<div style="font-size:12px;color:#1565c0;margin-top:4px">🚗 ${r.plate} — ${r.driver||''} (${FLEET_DEF[r.car_type]?.label||r.car_type||''})</div>`:'';
  // أسماء الأفراد
  const members=Array.isArray(r.members)&&r.members.length
    ? `<div style="margin-top:6px;padding:6px 8px;background:#f0f4ff;border-radius:8px;font-size:12px;color:#333;line-height:1.7">
        👥 ${r.members.join(' • ')}
       </div>` : '';
  const clientBadge = r.client
    ? `<div style="font-size:13px;font-weight:700;color:#e65100;margin-bottom:4px">🏢 ${r.client}</div>` : '';
  const routeLine = r.stop_loc
    ? `📍 ${r.from_loc||'—'} ← 🔸 ${r.stop_loc} ← 🏁 ${r.dest||'—'}`
    : `📍 ${r.from_loc||'—'} ➜ 🏁 ${r.dest||'—'}`;
  // تقييم الرحلة — يظهر للمهندس بعد الاعتماد
  const ratingStored = r.rating ? `<div style="font-size:13px;margin-top:6px">⭐ ${'⭐'.repeat(r.rating)} (${r.rating}/5)${r.ratingNote?` — ${r.ratingNote}`:''}</div>` : '';
  const ratingBtn = (!mgr && status==='approved' && !r.rating)
    ? `<button class="btn b-sm b-out" style="margin-top:8px;font-size:13px" onclick="openRating('${r.id}')">⭐ قيّم الرحلة</button>` : '';
  // أزرار تعديل وإلغاء (للمهندس فقط قبل الاعتماد)
  const editBtns = (!mgr && status==='pending')
    ? `<div style="display:flex;gap:6px;margin-top:8px">
        <button class="btn b-sm b-out" style="font-size:12px;flex:1" onclick="openEditReq('${r.id}')">✏️ تعديل</button>
        <button class="btn b-sm" style="font-size:12px;flex:1;background:#e53935" onclick="cancelReq('${r.id}')">❌ إلغاء</button>
       </div>` : '';

  return `<div class="rq ${status}" id="rq-${r.id}">
    <div class="rq-top"><div class="rq-team">👷 ${r.team||'—'}</div>${badge}</div>
    ${clientBadge}
    <div class="rq-route">${routeLine}</div>
    <div class="rq-sub">👥 ${r.techs||0} فرد | ${r.created_by||'—'}</div>
    ${members}
    ${veh}
    ${ratingStored}
    ${ratingBtn}
    ${editBtns}
  </div>`;
}

// ══ GEO CLUSTERING ══
// يجمّع الطلبات اللي:
//   1. الوجهات قريبة (destThreshold)
//   2. ونقاط الانطلاق قريبة أو على نفس المسار (fromThreshold)
// → سيارة واحدة متعددة نقاط الركوب بدل كذا سيارة
function clusterRequests(pending, destThreshold, fromThreshold){
  // ترتيب تنازلي بالأفراد (الأكبر يكون seed أول)
  const sorted = [...pending].sort((a,b)=>(parseInt(b.techs)||0)-(parseInt(a.techs)||0));

  const clusters = [];

  sorted.forEach(r=>{
    let placed = false;
    for(const cl of clusters){
      // شرط 1: كل الوجهات في الـ cluster قريبة من وجهة الطلب الجديد
      const destOk = cl.every(x=> geoDistance(x.dest||'', r.dest||'') <= destThreshold);
      // شرط 2: كل نقاط الانطلاق قريبة (الفني يقدر يتحرك للالتقاء)
      const fromOk = cl.every(x=> geoDistance(x.from_loc||'', r.from_loc||'') <= fromThreshold);

      if(destOk && fromOk){
        cl.push(r);
        placed = true;
        break;
      }
    }
    if(!placed) clusters.push([r]);
  });

  return clusters.map(cl=>{
    const ids   = cl.map(x=>x.id);
    const techs = cl.reduce((s,x)=>s+parseInt(x.techs||0), 0);
    const dests = [...new Set(cl.map(x=>x.dest).filter(Boolean))];
    const froms = [...new Set(cl.map(x=>x.from_loc).filter(Boolean))];

    // نقطة الانطلاق الرئيسية = اللي فيها أكتر ناس
    const primaryFrom = froms.reduce((best,f)=>{
      const cntF    = cl.filter(x=>x.from_loc===f).reduce((s,x)=>s+parseInt(x.techs||0),0);
      const cntBest = cl.filter(x=>x.from_loc===best).reduce((s,x)=>s+parseInt(x.techs||0),0);
      return cntF > cntBest ? f : best;
    }, froms[0]);

    return {
      from:         primaryFrom,
      froms,                          // كل نقاط الركوب
      dests,
      ids,
      techs,
      rows:         cl,
      merged:       dests.length>1 || froms.length>1,
      mergedDests:  dests.length>1,
      mergedFroms:  froms.length>1,   // ← نقاط ركوب متعددة
    };
  }).sort((a,b)=>b.techs-a.techs);
}

function autoDistribute(){
  const vehicles = [...getVehicles()];
  const available = vehicles.map(v=>({...v, used:false}));

  const pending = REQS.filter(r=>r.status==='pending');

  // 🔑 Geo-cluster:
  //   DEST_THRESHOLD = 3 → وجهات في نفس المنطقة تتدمج
  //   FROM_THRESHOLD = 4 → نقاط انطلاق قريبة تتدمج (الفني يتحرك للالتقاء)
  const DEST_THRESHOLD = 3.0;
  const FROM_THRESHOLD = 4.0;
  const clusters = clusterRequests(pending, DEST_THRESHOLD, FROM_THRESHOLD);

  const companyAssignments = [];
  const rentalNeeded = [];

  clusters.forEach(g=>{
    let remaining = g.techs;
    const assigned = [];

    // Try smallest vehicle that fits all techs first
    const bySmall = available.filter(v=>!v.used).sort((a,b)=>FLEET_DEF[a.type].cap-FLEET_DEF[b.type].cap);
    for(const v of bySmall){
      if(remaining<=0) break;
      if(FLEET_DEF[v.type].cap >= remaining){
        v.used=true;
        assigned.push({...v, techs:remaining});
        remaining=0;
        break;
      }
    }
    // If still remaining, fill with largest available
    if(remaining>0){
      const byLarge = available.filter(v=>!v.used).sort((a,b)=>FLEET_DEF[b.type].cap-FLEET_DEF[a.type].cap);
      for(const v of byLarge){
        if(remaining<=0) break;
        v.used=true;
        const cap = FLEET_DEF[v.type].cap;
        assigned.push({...v, techs:Math.min(remaining,cap)});
        remaining -= cap;
      }
    }

    if(assigned.length>0){
      companyAssignments.push({
        ...g,
        dest: g.dests.join(' + '),
        vehicles: assigned,
        covered: g.techs - Math.max(0, remaining)
      });
    }
    if(remaining>0){
      rentalNeeded.push({...g, dest:g.dests.join(' + '), techs:remaining, originalTechs:g.techs});
    }
  });

  // حساب التوفير
  const originalCars = pending.length; // لو كل طلب لوحده سيارة
  const usedCars = companyAssignments.reduce((s,g)=>s+g.vehicles.length,0) + rentalNeeded.length;
  const saved = Math.max(0, originalCars - usedCars);

  return {companyAssignments, rentalNeeded, saved, originalCars};
}

function renderPlan(){
  const el=document.getElementById('tab-plan'); if(!el) return;
  if(!_autoPlan||(!_autoPlan.companyAssignments&&!_autoPlan.rentalNeeded)){
    el.innerHTML=`<div class="card"><div class="empty">اضغط "⚡ توزيع تلقائي" أولاً</div></div>`;
    return;
  }
  const {companyAssignments,rentalNeeded}=_autoPlan;
  let html='';

  // بادج التوفير في الأعلى
  if(_autoPlan.saved>0){
    html+=`<div style="background:#e8f5e9;border-radius:12px;padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px">
      <span style="font-size:28px">💡</span>
      <div>
        <div style="font-weight:700;color:#2e7d32;font-size:14px">تم توفير ${_autoPlan.saved} سيارة بالدمج الذكي!</div>
        <div style="font-size:12px;color:#555">من ${_autoPlan.originalCars} طلب → ${_autoPlan.originalCars - _autoPlan.saved} سيارة فعلية</div>
      </div>
    </div>`;

let _replaceCtx = null; // {oldVehId, oldPlate, oldDriver, groupIds}

function openReplaceDriver(vehId, plate, driver, groupIds){
  _replaceCtx = {vehId, plate, driver, groupIds: Array.isArray(groupIds)?groupIds:String(groupIds).split(',')};

    getVehicles()
      .filter(v => v.id !== vehId)
      .map(v => `<option value="${v.id}">${FLEET_DEF[v.type]?.icon||'🚗'} ${v.plate} — ${v.driver} (${FLEET_DEF[v.type]?.label||''}، سعة ${FLEET_DEF[v.type]?.cap||'?'})</option>`)

function confirmReplaceDriver(){
  if(!_replaceCtx) return;
  const newVehId = document.getElementById('replace-veh').value;
  const reason   = document.getElementById('replace-reason').value;
  if(!newVehId) return toast('✋ اختر السيارة البديلة');

  const newVeh = getVehicles().find(v=>v.id===newVehId);
  if(!newVeh) return toast('❌ سيارة غير موجودة');

  // تحديث _autoPlan في الذاكرة
  if(_autoPlan?.companyAssignments){
    _autoPlan.companyAssignments.forEach(g=>{
      g.vehicles.forEach(v=>{
        if(v.id === _replaceCtx.vehId){
          v.id     = newVeh.id;
          v.plate  = newVeh.plate;
          v.driver = newVeh.driver;
          v.type   = newVeh.type;
          v._replaced = true;
          v._replacedFrom = `${_replaceCtx.plate} — ${_replaceCtx.driver}`;
          v._reason = reason;
        }
      });
    });
  }

  toast(`✅ تم استبدال السيارة — ${reason}`);
  document.getElementById('replaceModal').style.display='none';
  renderPlan(); // تحديث العرض
  // تأكد إن tab الخطة ظاهر
  switchTab('plan');
}

async function approveAllCompany(){
  if(!_autoPlan?.companyAssignments?.length) return toast('لا توجد تعيينات');
  let count=0;

  // بناء payload كامل للـ savePlan
  const planPayload = [];

  for(const g of _autoPlan.companyAssignments){
    for(const v of g.vehicles){
      try{
        await api('assignVehicle',{
          ids:     g.ids,
          plate:   v.plate,
          driver:  v.driver,
          car_type:v.type,
          status:  'approved'
        });
        count++;
      }catch(e){}

      // جمع بيانات الخطة لإرسال إشعارات نقاط الالتقاء
      planPayload.push({
        plate:     v.plate,
        driver:    v.driver,
        car_type:  v.type,
        primaryFrom: g.from,
        allFroms:  g.froms || [g.from],
        dests:     g.dests || [g.dest],
        techs:     v.techs,
        ids:       g.ids,
        mergedFroms: g.mergedFroms || false,
        rows:      g.rows || [],
      });
    }
  }

  // إرسال الخطة الكاملة → Apps Script يبعت Telegram للفنيين
  try{
    await api('savePlan',{
      date:  todayStr(),
      plan:  planPayload,
      approved_by: U.name,
    });
  }catch(e){ console.warn('savePlan error',e); }

  toast(`✅ تم اعتماد ${count} سيارة — تم إشعار الفرق`);
  loadAllReqs();
}

const GEO = {
  'مصنع موبيكا — أبورواش':  {x:-4, y:1},
  'المنطقة الصناعية أبورواش':{x:-4, y:1},
  'أوسيم':                   {x:-3, y:1},
  'كرداسة':                  {x:-3, y:0},

  'المنطقة الصناعية 6 أكتوبر':{x:-4,y:0},
  'الهرم':                   {x:-2, y:-1},
  'فيصل':                    {x:-2, y:0},
  'الجيزة':                  {x:-1, y:0},
  'المنصورية':               {x:-2, y:1},   // منشأة القناطر — شمال غرب الجيزة
  'البدرشين':                {x:-1, y:-3},

  'عين شمس':                 {x:1,  y:3},
  'المطرية':                 {x:1,  y:2},
  'مصر الجديدة':             {x:2,  y:2},
  'هليوبوليس':               {x:2,  y:2},
  'المعادي':                 {x:1,  y:-2},
  'المقطم':                  {x:2,  y:0},
  'حلوان':                   {x:1,  y:-4},
  '15 مايو':                 {x:1,  y:-4},
  'الشروق':                  {x:4,  y:2},
  'الرحاب':                  {x:4,  y:1},
  'التجمع الأول':            {x:4,  y:0},
  'التجمع الخامس':           {x:5,  y:0},
  'القاهرة الجديدة':         {x:5,  y:1},
  'مدينتي':                  {x:6,  y:0},
  'المستقبل سيتي':           {x:6,  y:2},
  'بدر':                     {x:5,  y:3},
  'العبور':                  {x:3,  y:4},

  'الشيخ زايد':              {x:-3, y:1},
  'القاهرة':                 {x:0,  y:0},
};

function geoPos(loc){ return GEO[loc] || {x:0,y:0}; }

function geoDistance(a,b){
  const pa=geoPos(a), pb=geoPos(b);
  return Math.sqrt(Math.pow(pa.x-pb.x,2)+Math.pow(pa.y-pb.y,2));
}

// Sort stops along a route (nearest-neighbor from first stop)
function sortStops(stops){
  if(stops.length<=1) return stops;
  const result=[stops[0]];
  const remaining=[...stops.slice(1)];
  while(remaining.length){
    const last=result[result.length-1];
    let minD=Infinity, minI=0;
    remaining.forEach((s,i)=>{
      const d=geoDistance(last.loc,s.loc);
      if(d<minD){minD=d;minI=i;}
    });
    result.push(remaining.splice(minI,1)[0]);
  }
  return result;
}

// ══ MULTI-STOP ROUTE MODAL ══
let _routeStops=[]; // {loc, action:'pickup'|'dropoff', people, id}
let _routeVehicle=null;

function openRouteModal(vehIdx, requestIds){
  const vs=getVehicles();
  _routeVehicle={...vs[vehIdx], cap:FLEET_DEF[vs[vehIdx].type]?.cap||7};
  _routeStops=[];
  // Pre-populate from requests — نقاط ركوب وإنزال حقيقية
  const myReqs=REQS.filter(r=>requestIds.includes(r.id));
  const pickupGroups={}, dropGroups={};
  myReqs.forEach(r=>{
    if(!pickupGroups[r.from_loc]) pickupGroups[r.from_loc]=0;
    pickupGroups[r.from_loc]+=parseInt(r.techs)||0;
    if(!dropGroups[r.dest]) dropGroups[r.dest]=0;
    dropGroups[r.dest]+=parseInt(r.techs)||0;
  });

  // ترتيب نقاط الركوب: الأكبر (primary) أول، والباقي عليه بادج "التقاء"
  const pickupEntries = Object.entries(pickupGroups).sort((a,b)=>b[1]-a[1]);
  const primaryFrom = pickupEntries[0]?.[0];

  pickupEntries.forEach(([loc,p],i)=>{
    _routeStops.push({
      id:'s'+Date.now()+Math.random(),
      loc, action:'pickup', people:p,
      note: i>0 ? '📌 نقطة التقاء' : '🟢 نقطة التحرك'
    });
  });
  Object.entries(dropGroups).forEach(([loc,p])=>{
    _routeStops.push({id:'s'+Date.now()+Math.random(),loc,action:'dropoff',people:p,note:'🔴 إنزال'});
  });

  // ترتيب جغرافي ذكي: pickups أولاً (بالترتيب الجغرافي)، ثم dropoffs
  const pickupStops = _routeStops.filter(s=>s.action==='pickup');
  const dropStops   = _routeStops.filter(s=>s.action==='dropoff');
  _routeStops = [...sortStops(pickupStops), ...sortStops(dropStops)];
  renderRouteModal();
  document.getElementById('rmodal').classList.add('open');
}

function renderRouteModal(){
  const v=_routeVehicle;
  const cap=v.cap;
  const locOpts=LOCS.map(l=>`<option value="${l}">${l}</option>`).join('');
  // Capacity per segment
  let onBoard=0;
  const stopsHTML=_routeStops.map((s,i)=>{
    if(s.action==='pickup') onBoard+=s.people;
    else onBoard-=s.people;
    onBoard=Math.max(0,onBoard);
    const col=onBoard>cap?'#c62828':onBoard>cap*.8?'#f57c00':'#2e7d32';
    const actionLabel=s.note||(s.action==='pickup'?'🟢 ركوب':'🔴 نزول');
    const noteTag=s.note&&s.action==='pickup'&&i>0
      ?`<div style="font-size:11px;color:#e65100;font-weight:700;margin-bottom:4px">📌 نقطة التقاء — الفني يتحرك لمقابلة السيارة هنا</div>`:
      s.action==='pickup'&&i===0?`<div style="font-size:11px;color:#2e7d32;font-weight:700;margin-bottom:4px">🟢 نقطة التحرك الرئيسية</div>`:'';
    return `<div style="background:#fff;border-radius:10px;padding:10px;margin-bottom:8px;border-right:4px solid ${s.action==='pickup'?'#2e7d32':'#f57c00'}">
      ${noteTag}
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
        <span style="font-weight:700;font-size:13px;min-width:20px">${i+1}.</span>
        <select style="flex:1;padding:7px;border:1.5px solid #ddd;border-radius:8px;font-size:13px;font-family:inherit"
          onchange="updateStop('${s.id}','loc',this.value)">
          <option value="">— اختر —</option>${locOpts.replace(`value="${s.loc}"`,`value="${s.loc}" selected`)}
        </select>
        <select style="padding:7px;border:1.5px solid #ddd;border-radius:8px;font-size:13px;font-family:inherit"
          onchange="updateStop('${s.id}','action',this.value)">
          <option value="pickup"  ${s.action==='pickup'?'selected':''}>🟢 ركوب</option>
          <option value="dropoff" ${s.action==='dropoff'?'selected':''}>🔴 نزول</option>
        </select>
        <input type="number" value="${s.people}" min="1" style="width:55px;padding:7px;border:1.5px solid #ddd;border-radius:8px;font-size:13px;text-align:center"
          onchange="updateStop('${s.id}','people',this.value)">
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px;flex-wrap:wrap;gap:4px">
        <div style="display:flex;align-items:center;gap:6px">
          <span style="font-size:12px;color:${col}">على متن: <b>${onBoard}</b>/${cap}</span>
          ${s.loc?`<a href="${mapsUrl(s.loc)}" target="_blank" rel="noopener" style="font-size:11px;background:#4285f4;color:#fff;padding:3px 7px;border-radius:6px;text-decoration:none">📍 خريطة</a>`:''}
        </div>
        <div style="display:flex;gap:4px">
          ${i>0?`<button class="btn b-out b-xs" onclick="moveStop('${s.id}',-1)">↑</button>`:''}
          ${i<_routeStops.length-1?`<button class="btn b-out b-xs" onclick="moveStop('${s.id}',1)">↓</button>`:''}
          <button class="btn b-red b-xs" onclick="removeStop('${s.id}')">✕</button>
        </div>
      </div>
    </div>`;
  }).join('');

  // Evening return (reverse order, pickups become dropoffs)
  const returnStops=[..._routeStops].reverse().map(s=>({...s,action:s.action==='pickup'?'dropoff':'pickup'}));
  const returnHTML=returnStops.map((s,i)=>`
    <div style="display:flex;align-items:center;gap:8px;padding:7px;background:#fff;border-radius:8px;margin-bottom:6px;font-size:13px">
      <span style="font-weight:700">${i+1}.</span>
      <span>${s.action==='pickup'?'🟢':'🔴'} ${s.loc||'—'}</span>
      <span style="color:#888;margin-right:auto">${s.people} فرد</span>
    </div>`).join('');

  document.getElementById('rmodal-body').innerHTML=`
    <div style="background:#f5f5f5;border-radius:8px;padding:10px;margin-bottom:14px;font-size:13px">
      ${FLEET_DEF[v.type]?.icon} ${v.plate} — ${v.driver} | سعة: ${cap} راكب
    </div>
    <div style="font-weight:700;font-size:14px;color:#1565c0;margin-bottom:8px">☀️ رحلة الصباح</div>
    ${stopsHTML}
    <button class="btn b-out b-sm" style="margin-bottom:16px" onclick="addStop()">+ محطة جديدة</button>
    <button class="btn b-blue b-sm" style="margin-bottom:16px;margin-right:8px" onclick="autoSortStops()">🗺 ترتيب تلقائي</button>
    <div style="font-weight:700;font-size:14px;color:#e65100;margin-bottom:8px">🌙 رحلة العودة (تلقائية)</div>
    <div style="background:#fff8e1;border-radius:8px;padding:10px;margin-bottom:14px">${returnHTML||'<div class="empty">لا توجد محطات</div>'}</div>
    <div style="display:flex;gap:8px">
      <button class="btn b-green" onclick="saveRoute()">✅ حفظ الخطة</button>
      <button class="btn b-blue b-sm" onclick="printDriverSheet()">🖨️ ورقة السائق</button>
      <button class="btn b-out" onclick="closeModal('rmodal')">إلغاء</button>
    </div>`;
}

function addStop(){
  _routeStops.push({id:'s'+Date.now(),loc:'',action:'pickup',people:1});
  renderRouteModal();
}

function removeStop(id){
  _routeStops=_routeStops.filter(s=>s.id!==id);
  renderRouteModal();
}

function updateStop(id,field,value){
  const s=_routeStops.find(x=>x.id===id);
  if(s){ s[field]=field==='people'?parseInt(value)||1:value; renderRouteModal(); }
}

function moveStop(id,dir){
  const i=_routeStops.findIndex(s=>s.id===id);
  const j=i+dir;
  if(j<0||j>=_routeStops.length) return;
  [_routeStops[i],_routeStops[j]]=[_routeStops[j],_routeStops[i]];
  renderRouteModal();
}

function autoSortStops(){
  _routeStops=sortStops(_routeStops);
  renderRouteModal();
  toast('✅ تم الترتيب الجغرافي التلقائي');
}

function saveRoute(){
  closeModal('rmodal');
  toast('✅ تم حفظ خطة الرحلة');
}

function printDriverSheet(){
  const v=_routeVehicle;
  const returnStops=[..._routeStops].reverse().map(s=>({...s,action:s.action==='pickup'?'dropoff':'pickup'}));
  let onBoard=0;
  const morningRows=_routeStops.map((s,i)=>{
    if(s.action==='pickup') onBoard+=s.people;
    else onBoard=Math.max(0,onBoard-s.people);
    return `<tr><td>${i+1}</td><td>${s.action==='pickup'?'🟢 ركوب':'🔴 نزول'}</td><td>${s.loc||'—'}</td><td>${s.people}</td><td>${onBoard}</td></tr>`;
  }).join('');
  onBoard=0;
  const eveningRows=returnStops.map((s,i)=>{
    if(s.action==='pickup') onBoard+=s.people;
    else onBoard=Math.max(0,onBoard-s.people);
    return `<tr><td>${i+1}</td><td>${s.action==='pickup'?'🟢 ركوب':'🔴 نزول'}</td><td>${s.loc||'—'}</td><td>${s.people}</td><td>${onBoard}</td></tr>`;
  }).join('');
  const date=new Date().toLocaleDateString('ar-EG',{year:'numeric',month:'long',day:'numeric'});
  const w=window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html dir="rtl"><head><meta charset="utf-8"><title>ورقة سائق</title>
  <style>body{font-family:Arial;padding:20px}h2,h3{color:#1565c0}table{width:100%;border-collapse:collapse;margin:10px 0}
  th{background:#1565c0;color:#fff;padding:8px;text-align:right}td{padding:7px 8px;border-bottom:1px solid #ddd}
  tr:nth-child(even){background:#f5f5f5}.header{background:#e3f2fd;padding:12px;border-radius:8px;margin-bottom:16px}
  @media print{button{display:none}}</style></head><body>
  <div class="header">
    <h2>🚗 ورقة السائق — موبيكا</h2>
    <p>📅 ${date} | السيارة: ${v.plate} | السائق: ${v.driver} | السعة: ${v?.cap||'—'} راكب</p>
  </div>
  <h3>☀️ رحلة الصباح</h3>
  <table><thead><tr><th>#</th><th>النشاط</th><th>الموقع</th><th>عدد الأفراد</th><th>على المتن</th></tr></thead><tbody>${morningRows}</tbody></table>
  <h3>🌙 رحلة العودة</h3>
  <table><thead><tr><th>#</th><th>النشاط</th><th>الموقع</th><th>عدد الأفراد</th><th>على المتن</th></tr></thead><tbody>${eveningRows}</tbody></table>
  <br><button onclick="print()" style="padding:10px 24px;background:#1565c0;color:#fff;border:none;border-radius:8px;cursor:pointer">🖨️ طباعة</button>
  </body></html>`);
  w.document.close();
}

// ══ BEST FIT ══
function bestFit(techs){
  const types=Object.keys(FLEET_DEF).sort((a,b)=>FLEET_DEF[a].cap-FLEET_DEF[b].cap);
  for(const t of types){ if(FLEET_DEF[t].cap>=techs) return {type:t}; }
  return {type:'bus26'};
}

// ══ API ══
// كل الـ requests بتتعمل GET — Apps Script بيدعم ده بدون CORS issues
async function api(action,data){
  if(API_URL.includes('PASTE')) return demoPost(action,data);
  const flat={};
  for(const[k,v] of Object.entries(data||{})){
    flat[k]=Array.isArray(v)?JSON.stringify(v):(v==null?'':String(v));
  }
  const q=new URLSearchParams({action,...flat});
  const r=await fetch(API_URL+'?'+q);
  return r.json();
}
async function apiGet(action,params){
  if(API_URL.includes('PASTE')) return demoGet(action,params);
  const q=new URLSearchParams({action,...params});
  const r=await fetch(API_URL+'?'+q);
  return r.json();
}

try{_demo=JSON.parse(localStorage.getItem('demo_r')||'[]');}catch(e){}
function saveD(){try{localStorage.setItem('demo_r',JSON.stringify(_demo));}catch(e){}}
function demoPost(action,data){
  if(action==='addRequest'){const id='R'+Date.now().toString(36).toUpperCase();_demo.push({id,status:'pending',...data});saveD();return Promise.resolve({ok:true,id});}
  if(action==='assignVehicle'){(data.ids||[]).forEach(id=>{const r=_demo.find(x=>x.id===id);if(r){r.plate=data.plate;r.driver=data.driver;r.car_type=data.car_type;r.status=data.status||'approved';}});saveD();return Promise.resolve({ok:true});}
  return Promise.resolve({ok:false});
}
function demoGet(action,params){
  return Promise.resolve({ok:true,requests:_demo.filter(r=>!params.date||r.date===params.date)});
}

function toast(msg,ms=3500){const el=document.getElementById('toast');el.textContent=msg;el.style.opacity='1';clearTimeout(el._t);el._t=setTimeout(()=>el.style.opacity='0',ms);}

<script>
let _ratingReqId=null, _ratingVal=0;
function openRating(id){
  _ratingReqId=id; _ratingVal=0;
  document.querySelectorAll('.star').forEach(s=>s.style.color='#ccc');
  document.getElementById('rating-note').value='';
  document.getElementById('ratingModal').style.display='flex';
}
function setStar(v){
  _ratingVal=v;
  document.querySelectorAll('.star').forEach(s=>{
    s.style.color=parseInt(s.dataset.v)<=v?'#f9a825':'#ccc';
  });
}
async function submitRating(){
  if(!_ratingVal) return toast('✋ اختر عدد النجوم أولاً');
  const note=document.getElementById('rating-note').value.trim();
  const reqs=loadLocalReqs();
  const req=reqs.find(r=>r.id===_ratingReqId);
  if(req){ req.rating=_ratingVal; req.ratingNote=note; saveLocalReqs(reqs); }
  await api('rateRequest',{id:_ratingReqId, rating:_ratingVal, ratingNote:note});
  document.getElementById('ratingModal').style.display='none';
  toast('✅ شكراً على تقييمك! ⭐'.repeat(_ratingVal));
  loadMyReqs();
}
</script>
